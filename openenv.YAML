name: pipeline-watchdog
description: >
  RL environment where an AI agent monitors and optimizes data pipelines,
  handling deployment failures, SQL performance issues, incremental load
  optimization, and design debt escalation with evidence.

entry_point: environment:PipelineWatchdogEnv

max_steps: 50

actions:
  - inspect_logs
  - classify_layer
  - compare_runs
  - analyze_query
  - rollback_deployment
  - verify_and_redeploy
  - flag_for_optimization
  - escalate_with_evidence
  - deprioritize_job
  - add_incremental_load
  - clean_data
  - ignore

observation_space:
  type: dict
  properties:
    event_type: str
    event_severity: str
    event_category: str
    pipeline_id: int
    pipeline_name: str
    step_count: int
    events_resolved: int
    events_missed: int
    evidence_score: float
    unresolved_count: int
    log_summary: str
    hint: str

reward_range: [-1, 1]

tags:
  - reinforcement-learning
  - data-engineering
  - pipeline-optimization
  - sql
  - incremental-load
